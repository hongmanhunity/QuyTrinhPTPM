version: '3.8'

services:
  web:
    build: . # Trỏ tới file Dockerfile vừa tạo thay vì dùng trực tiếp image (để cài đặt thêm PDO)
    container_name: web_php
    ports:
      - "8080:80" # Sử dụng cổng 8080 ở ngoài để tránh xung đột với ứng dụng khác (truy cập bằng http://IP:8080)
    volumes:
      - ./:/var/www/html/ # Ánh xạ code
    environment:
      DB_HOST: "db"
      DB_USER: "root"
      DB_PASS: "root"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: db_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quan_ly_cua_hang # Tên database gốc
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
